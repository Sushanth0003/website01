<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIORA CAPTURES — Photography & Digital Marketing</title>
<style>
  :root{
    --bg:#0A0A0A; --panel:#141414; --gold:#C9A24B;
    --text:#FFFFFF; --muted:#CFCFCF;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Segoe UI',system-ui,sans-serif;
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    padding:24px;overflow-x:hidden;
  }
  .glow{
    position:fixed;top:-20%;left:50%;transform:translateX(-50%);
    width:600px;height:600px;border-radius:50%;
    background:radial-gradient(circle,rgba(201,162,75,.15),transparent 70%);
    pointer-events:none;
  }
  .line{width:60px;height:1px;background:var(--gold);margin:24px auto}
  .brand{
    font-size:clamp(34px,7vw,64px);letter-spacing:.35em;
    font-weight:300;text-transform:uppercase;
    padding-left:.35em;
  }
  .tag{
    color:var(--gold);font-size:clamp(13px,2.5vw,18px);
    letter-spacing:.15em;margin-top:14px;font-style:italic;
  }
  .services{
    color:var(--muted);font-size:clamp(12px,2.2vw,15px);
    letter-spacing:.1em;margin-top:8px;text-transform:uppercase;
  }
  .sub{color:var(--muted);max-width:520px;margin:22px auto 0;line-height:1.7;font-size:15px}
  .cta{
    display:inline-block;margin-top:34px;padding:14px 38px;
    border:1px solid var(--gold);color:var(--gold);
    text-decoration:none;letter-spacing:.15em;text-transform:uppercase;
    font-size:13px;transition:.3s;border-radius:2px;
  }
  .cta:hover{background:var(--gold);color:var(--bg);box-shadow:0 0 24px rgba(201,162,75,.4)}
  footer{position:fixed;bottom:18px;color:#555;font-size:11px;letter-spacing:.1em}
</style>
</head>
<body>
  <div class="glow"></div>

  <div class="brand">Liora Captures</div>
  <div class="line"></div>
  <div class="tag">Capturing Moments. Creating Memories.</div>
  <div class="services">Photography · Videography · Digital Marketing</div>

  <p class="sub">
    A Bengaluru studio for premium visuals and digital growth —
    clinics, restaurants, events, real estate & brands.
  </p>

  <a class="cta" href="#">Get a Quote</a>

  <footer>© 2026 LIORA CAPTURES · Bengaluru</footer>
</body>
</html>
